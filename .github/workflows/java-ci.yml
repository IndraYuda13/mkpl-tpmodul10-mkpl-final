name: Java Maven CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run Maven tests
        run: mvn -B clean test

      - name: Run Java assertion test directly
        run: |
          mvn -B test-compile
          java -ea -cp target/classes:target/test-classes com.praktikkum.tpmodul10.ModelAssertionTest
